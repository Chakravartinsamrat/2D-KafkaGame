# Kafka topic configuration for the 2D game
# Used with: kafka-topics.sh --create --config-file game-topics.properties
# (or as reference for manual creation)

# ── game-events ────────────────────────────────────────────────────────────
# Main event stream: MOVE, SHOOT, HIT, PLAYER_DIED, RESPAWN
num.partitions=3
replication.factor=1
retention.ms=86400000     # 24 hours — enough for same-day replay
cleanup.policy=delete
